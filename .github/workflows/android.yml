name: Android

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "android/**"
      - ".github/workflows/android.yml"

permissions:
  contents: read

jobs:
  probe:
    name: Build & lint
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Probe runner toolchain
        run: |
          set -eux
          uname -a
          echo "--- env (filtered) ---"
          env | grep -Ei 'JAVA|ANDROID|GRADLE|HOME|PATH' | sort
          echo "--- which ---"
          for c in java javac kotlinc gradle sdkmanager adb; do
            which "$c" || echo "missing: $c"
          done
          echo "--- /opt ---"
          ls /opt 2>/dev/null || true
          echo "--- /usr/local/lib ---"
          ls /usr/local/lib 2>/dev/null || true
          echo "--- common Android SDK locations ---"
          for d in \
            /usr/local/lib/android/sdk \
            /opt/android-sdk \
            /opt/android/sdk \
            "$HOME/Android/Sdk" \
            "$HOME/android-sdk" \
            "$ANDROID_HOME" \
            "$ANDROID_SDK_ROOT"; do
            if [ -n "$d" ] && [ -d "$d" ]; then
              echo "FOUND: $d"
              ls "$d" | head -20
            fi
          done
          echo "--- Java version ---"
          java -version 2>&1 || true
          echo "--- Gradle version ---"
          (gradle --version 2>&1 | head -10) || echo "no system gradle"

      - name: Try Gradle wrapper if SDK available
        working-directory: android
        run: |
          set -eux
          chmod +x ./gradlew
          ./gradlew --version
          # Only attempt assembleDebug if we found an Android SDK on the runner
          if [ -n "${ANDROID_HOME:-}${ANDROID_SDK_ROOT:-}" ] || \
             [ -d /usr/local/lib/android/sdk ] || \
             [ -d /opt/android-sdk ]; then
            export ANDROID_HOME="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/local/lib/android/sdk}}"
            echo "Using ANDROID_HOME=$ANDROID_HOME"
            ./gradlew :app:assembleDebug --stacktrace || echo "assembleDebug failed (see log above)"
          else
            echo "No Android SDK on runner; skipping assembleDebug."
          fi

      - name: Upload anything that built
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/reports/
          if-no-files-found: ignore
