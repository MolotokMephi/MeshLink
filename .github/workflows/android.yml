name: Android

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "android/**"
      - ".github/workflows/android.yml"

permissions:
  contents: read

jobs:
  build:
    name: Build & lint
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: android

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: true
          packages: |
            platform-tools
            platforms;android-34
            build-tools;34.0.0

      - name: Configure Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          build-root-directory: android

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Sanity check (Gradle + SDK)
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "JAVA_HOME=$JAVA_HOME"
          ./gradlew --version

      - name: Assemble debug
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Android Lint
        # Lint is informative, not gating — failures here shouldn't fail the
        # whole job until we have a baseline. We still upload the report.
        continue-on-error: true
        run: ./gradlew :app:lintDebug --stacktrace

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: meshlink-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: |
            android/app/build/reports/lint-results-*.html
            android/app/build/reports/lint-results-*.xml
          if-no-files-found: ignore

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: |
            android/app/build/reports/tests/
            android/app/build/test-results/
          if-no-files-found: ignore
