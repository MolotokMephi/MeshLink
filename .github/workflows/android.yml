name: Android

on:
  push:
    branches: [main, "claude/**"]
    paths:
      - "android/**"
      - ".github/workflows/android.yml"
  pull_request:
    paths:
      - "android/**"
      - ".github/workflows/android.yml"

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  build:
    name: Build & lint
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Probe runner toolchain
        run: |
          set -eux
          java -version 2>&1 || true
          # ubuntu-latest images ship with the Android SDK pre-installed
          # at /usr/local/lib/android/sdk; surface the exact paths so the
          # gradle build step picks them up via ANDROID_HOME below.
          echo "ANDROID_HOME=${ANDROID_HOME:-}"
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-}"
          ls "${ANDROID_HOME:-/usr/local/lib/android/sdk}" || true

      - name: Assemble debug APK
        id: assemble
        working-directory: android
        run: |
          set -eo pipefail
          chmod +x ./gradlew
          ./gradlew --version
          ./gradlew :app:assembleDebug --stacktrace 2>&1 | tee /tmp/gradle.log

      - name: Surface failure to step summary + PR comment
        if: failure() && steps.assemble.conclusion == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          {
            echo "# Build failure"
            echo
            echo "## Tail of gradle output"
            echo '```'
            tail -200 /tmp/gradle.log 2>/dev/null || echo "no gradle log"
            echo '```'
          } > /tmp/summary.md
          cat /tmp/summary.md >> "$GITHUB_STEP_SUMMARY" || true
          # Post the failure summary as a PR comment so we can read it
          # without admin auth on the action logs.
          if [ -n "${PR_NUMBER:-}" ]; then
            jq -n --arg body "$(cat /tmp/summary.md)" '{body: $body}' > /tmp/comment.json
            curl -sS -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -d @/tmp/comment.json \
              "https://api.github.com/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
              -o /tmp/comment_response.json -w "HTTP %{http_code}\n" || true
          fi

      - name: Run unit tests
        working-directory: android
        run: ./gradlew :app:testDebugUnitTest --stacktrace
        continue-on-error: true

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            android/app/build/outputs/apk/debug/*.apk
            android/app/build/reports/
            /tmp/gradle.log
          if-no-files-found: ignore
